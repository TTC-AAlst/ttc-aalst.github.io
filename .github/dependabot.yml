version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # Dev dependencies - safe to batch together
      dev-dependencies:
        dependency-type: development
      # Production patches - low risk
      production-patch:
        dependency-type: production
        update-types:
          - patch
      # Production minor/major - review together
      production-updates:
        dependency-type: production
        update-types:
          - minor
          - major
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
