name: CI

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches: [master]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v6

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Cache bun dependencies
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
        restore-keys: |
          bun-${{ runner.os }}-

    - run: bun install --frozen-lockfile

    - name: Format check
      run: bun run format:check

    - name: Lint
      run: bun run lint

    - name: Dead code check
      run: bun run knip

    - name: Type check & build
      run: bun run build

    - name: Test with coverage
      run: bun run test:coverage

    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: bunx playwright install --with-deps chromium

    - name: Install Playwright deps (cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: bunx playwright install-deps chromium

    - name: E2E smoke tests
      run: bun run test:e2e

    - name: Dependency audit
      run: bun audit --audit-level=high

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - run: dotnet restore Ttc.slnx

    - name: Format check
      run: dotnet format Ttc.slnx --verify-no-changes --verbosity quiet

    - name: Build
      run: dotnet build Ttc.slnx --no-restore --verbosity quiet

    - name: Test
      run: dotnet test Ttc.slnx --no-build --verbosity quiet
