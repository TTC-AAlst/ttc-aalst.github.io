name: CI

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - run: bun install --frozen-lockfile

    - name: Format check
      run: bun run format:check

    - name: Lint
      run: bun run lint

    - name: Dead code check
      run: bun run knip

    - name: Type check & build
      run: bun run build

    - name: Test with coverage
      run: bun run test:coverage

    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ steps.playwright-version.outputs.version }}-chromium

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: bunx playwright install --with-deps chromium

    - name: Install Playwright deps (cached)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: bunx playwright install-deps chromium

    - name: E2E smoke tests
      run: bun run test:e2e

    - name: Dependency audit
      run: bun audit --audit-level=high

    # TODO: Wait until we have a gitleaks secret
