name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Ttc.slnx

      - name: Check formatting
        run: dotnet format Ttc.slnx --verify-no-changes

      - name: Build
        run: dotnet build Ttc.slnx --no-restore

      - name: Run tests
        run: dotnet test Ttc.slnx --no-build --verbosity normal
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
