services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    # MySQL 8 idles ~470M; the bulk is performance_schema (allocated up front, never freed) +
    # the default buffer pool. This is a small club DB — trim both. ~470M → ~250M per instance.
    command:
      - --performance-schema=OFF
      - --innodb-buffer-pool-size=64M
      - --innodb-buffer-pool-instances=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my-secret-pw}
      MYSQL_DATABASE: ttc_aalst
      # dev/PR only (manifest envByTier.dev): gates the seed dir's 02-scrub.sh, which resets all
      # logins + emails. Prod never sets it → empty here → scrub no-ops (disaster-restore safe).
      SCRUB_DEV: ${SCRUB_DEV:-}
    ports:
      # Prod MySQL published on the LAN for DB clients. DB_PORT is set per-tier in the Coolify
      # manifest (envByTier.prod -> "3306:3306", binds 0.0.0.0 on apps-01). Unset on dev/PR ->
      # the default below = a random LOOPBACK port: not LAN-exposed, and unique so dev + every PR
      # preview (all on apps-01) never collide. WARNING: prod exposes MySQL root to the whole VLAN.
      - "${DB_PORT:-127.0.0.1::3306}"
    volumes:
      - mysql-data:/var/lib/mysql
      # Seed for dev/PR previews (and disaster-restore for prod): a fixed apps-01 host dir the
      # ttc-seed job fills with the nightly prod dump (01-seed.sql). MySQL runs initdb scripts
      # ONLY on a fresh datadir, so prod's persistent volume means a normal redeploy never
      # re-imports — only a first/wiped datadir seeds. Static bind, not parameterised: Coolify
      # ignores ${VAR} in compose volume paths. Absent locally → auto-created empty → empty DB.
      - /data/ttc-aalst/seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: src/Ttc.WebApi/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Release}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my-secret-pw}
      MAILKIT_PASSWORD: ${MAILKIT_PASSWORD:-unused}
      TtcSettings__StartSyncJob: ${TtcSettings__StartSyncJob:-false}
      TtcSettings__Loki: ${TtcSettings__Loki:-http://loki:3100}
      TtcSettings__Origins: ${TtcSettings__Origins:-http://localhost}
    volumes:
      - upload:/upload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mysql-data:
  upload:
