services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my-secret-pw}
      MYSQL_DATABASE: ttc_aalst
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: src/Ttc.WebApi/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Release}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-my-secret-pw}
      MAILKIT_PASSWORD: ${MAILKIT_PASSWORD:-unused}
      TtcSettings__StartSyncJob: ${TtcSettings__StartSyncJob:-false}
      TtcSettings__Loki: ${TtcSettings__Loki:-http://loki:3100}
      TtcSettings__Origins: ${TtcSettings__Origins:-http://localhost}
    volumes:
      - upload:/upload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  mysql-data:
  upload:
