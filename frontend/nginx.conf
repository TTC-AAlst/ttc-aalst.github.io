upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # SignalR (WebSockets) — must come before the generic proxy locations.
    location /hubs/ttc {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Pure backend paths: REST API, upload endpoint, swagger (health).
    location ~ ^/(api|upload|swagger) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /img is split: static chrome (footer, sponsors, facts, logo) ships in the SPA
    # build (public/img → dist/img); uploaded photos (players, matches) are served
    # by the backend from /upload. Try the static file first, fall back to backend.
    location /img/ {
        try_files $uri @backend;
    }
    location @backend {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Content-hashed build output (Vite /assets/*-[hash].js|css) — immutable, cache forever.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA entry must always revalidate, otherwise a new deploy's asset hashes are never fetched.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri /index.html;
    }
}
