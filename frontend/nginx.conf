upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # SignalR (WebSockets) — must come before the generic proxy locations.
    location /hubs/ttc {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Backend-served paths: REST API, uploads, static images, swagger (health).
    location ~ ^/(api|upload|img|swagger) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri /index.html;
    }
}
